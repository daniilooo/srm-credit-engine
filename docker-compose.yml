services:
  postgres:
    image: postgres:16-alpine
    container_name: srm-credit-engine-postgres
    environment:
      POSTGRES_DB: srm_credit_engine
      POSTGRES_USER: srm
      POSTGRES_PASSWORD: srm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srm -d srm_credit_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
name: SRM Credit Engine CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Backend — Java 21 + Maven + JaCoCo
  # ---------------------------------------------------------------------------
  backend:
    name: Backend — Build, Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper executable
        run: chmod +x backend/mvnw

      - name: Build, test and verify coverage
        run: |
          cd backend
          ./mvnw -B clean verify

  # ---------------------------------------------------------------------------
  # Job 2: Frontend — Node 22 + build + Karma tests
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend — Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build production
        run: cd frontend && npm run build

      - name: Run unit tests (ChromeHeadless)
        run: cd frontend && npm test -- --watch=false --browsers=ChromeHeadless

  # ---------------------------------------------------------------------------
  # Job 3: Docker — Validate Compose config and build images
  # ---------------------------------------------------------------------------
  docker:
    name: Docker — Compose Validation & Image Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dummy secrets for Compose validation
        # The docker-compose.yml references ./backend/secrets/db_user and
        # ./backend/secrets/db_password via Docker Secrets (file driver).
        # These files are gitignored and do not exist in CI.
        # Dummy values are created here only for config validation and image
        # build — they are never committed and have no effect at runtime.
        run: |
          mkdir -p backend/secrets
          echo "ci_user" > backend/secrets/db_user
          echo "ci_password" > backend/secrets/db_password

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

  # ---------------------------------------------------------------------------
  # Job 4: Security — Detect accidentally committed sensitive files
  # ---------------------------------------------------------------------------
  security-checks:
    name: Security — Sensitive File Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for accidentally committed secrets
        run: |
          if git ls-files | grep -E '(^|/)(\.env|db_user|db_password)$'; then
            echo "ERROR: Sensitive file(s) found tracked by git. Remove them and update .gitignore."
            exit 1
          fi
          echo "Security check passed — no sensitive files tracked by git."

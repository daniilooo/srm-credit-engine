name: Validate main PR source

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validate-source-branch:
    name: Validate source branch for main
    runs-on: ubuntu-latest

    steps:
      - name: Validate source branch
        run: |
          echo "Base branch: ${{ github.base_ref }}"
          echo "Source branch: ${{ github.head_ref }}"

          if [[ "${{ github.base_ref }}" != "main" ]]; then
            echo "This validation only applies to PRs targeting main."
            exit 0
          fi

          if [[ "${{ github.head_ref }}" == release/* ]]; then
            echo "OK: main can receive PRs from release/* branches."
            exit 0
          fi

          echo "ERROR: main only accepts PRs from release/* branches."
          echo "Current source branch: ${{ github.head_ref }}"
          exit 1